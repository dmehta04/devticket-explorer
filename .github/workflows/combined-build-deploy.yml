# ============================================================================
# Flutter Publish Kit — Combined Build & Deploy (Both Platforms)
# ============================================================================
# Runs Android and iOS builds in parallel.
# Triggers on version tags (v*) or manual dispatch.
# ============================================================================

name: Build & Deploy All

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      android_track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      deploy:
        description: 'Deploy to stores after build?'
        required: true
        default: 'false'
        type: boolean

permissions:
  contents: read

jobs:
  # ── Tests (shared) ──────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.5.1'
          channel: 'stable'
          cache: true
      - run: flutter pub get
      - run: flutter test --no-pub
      - run: flutter analyze --no-pub

  # ── Android ─────────────────────────────────────────────────────────────
  android:
    name: Android Build
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.5.1'
          channel: 'stable'
          cache: true

      - name: Setup signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release-keystore.jks
          cat > android/key.properties << 'PROPS'
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=release-keystore.jks
          PROPS

      - run: flutter pub get
      - run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.sha }}
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Deploy to Play Store
        if: inputs.deploy == 'true' || github.event_name == 'push'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ secrets.ANDROID_PACKAGE_NAME }}
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.android_track || 'internal' }}

  # ── iOS ─────────────────────────────────────────────────────────────────
  ios:
    name: iOS Build
    needs: test
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.5.1'
          channel: 'stable'
          cache: true

      - run: cd ios && pod install --repo-update

      - uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.IOS_DISTRIBUTION_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Create exportOptions.plist
        run: |
          cat > ios/exportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ secrets.IOS_BUNDLE_ID }}</key>
              <string>${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}</string>
            </dict>
          </dict>
          </plist>
          PLIST

      - run: flutter pub get
      - run: flutter build ipa --release --export-options-plist=ios/exportOptions.plist

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa-${{ github.sha }}
          path: build/ios/ipa/*.ipa

      - name: Upload to TestFlight
        if: inputs.deploy == 'true' || github.event_name == 'push'
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}
