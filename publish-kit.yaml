# ============================================================================
# Flutter Publish Kit — App Configuration
# ============================================================================
# Generated by: publish-kit.sh init
# Replace all MOCK_ values with real ones before publishing.
# Quick check: grep -c "MOCK_" publish-kit.yaml
# ============================================================================

app:
  name: "devticket_app"
  description: "Deutschlandticket Explorer - Interactive map for €63/month D-Ticket destinations"
  version: "1.0.0"
  build_number: 1

# ── Android Configuration ────────────────────────────────────────────────────

android:
  application_id: "com.devticket.devticket_app"
  min_sdk: 21
  target_sdk: 34
  keystore:
    path: "MOCK_KEYSTORE_PATH"                     # e.g., "./android/app/release-keystore.jks"
    alias: "MOCK_KEY_ALIAS"                        # e.g., "release-key"
    store_password: "MOCK_STORE_PASSWORD"           # NEVER commit real password
    key_password: "MOCK_KEY_PASSWORD"               # NEVER commit real password
  play_store:
    service_account_json: "MOCK_SERVICE_ACCOUNT_JSON_PATH"
    track: "internal"                              # internal | alpha | beta | production

# ── iOS Configuration ────────────────────────────────────────────────────────

ios:
  bundle_id: "com.devticket.devticketApp"
  development_team: "MOCK_TEAM_ID"                 # 10-char Apple Team ID
  provisioning_profile: "MOCK_PROFILE_NAME"
  export_method: "app-store"                       # app-store | ad-hoc | enterprise | development
  appstore_connect:
    key_id: "MOCK_ASC_KEY_ID"
    issuer_id: "MOCK_ASC_ISSUER_ID"
    key_file: "MOCK_ASC_KEY_FILE_PATH"             # .p8 file path

# ── CI/CD ────────────────────────────────────────────────────────────────────

ci:
  flutter_version: "3.5.1"
  github_actions: true
  artifacts_path: "./build/artifacts"

# ── Store Metadata ───────────────────────────────────────────────────────────

metadata:
  primary_locale: "en-US"
  categories:
    android: "MOCK_ANDROID_CATEGORY"               # e.g., EDUCATION, FINANCE, TOOLS
    ios: "MOCK_IOS_CATEGORY"                       # e.g., Education, Finance, Utilities
  privacy_policy_url: "MOCK_PRIVACY_POLICY_URL"
